<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社会学读书笔记</title>
    
    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    
    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    
    <!-- Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Lunr.js -->
    <script src="https://unpkg.com/lunr/lunr.js"></script>
    
    <!-- D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <!-- 应用样式 -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/interactive.css">
</head>
<body>
    <!-- PyScript 加载提示 -->
    <div id="pyscript-loader" class="pyscript-loader" style="display: none;">
        <div class="loader-content">
            <span class="spinner"></span>
            <p>正在加载 Python 运行环境...</p>
            <small>首次加载可能需要 10-20 秒</small>
        </div>
    </div>

    <div class="container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <h1>📚 社会学读书笔记</h1>
            </div>
            <nav class="nav">
                <a href="#home" class="nav-item active" data-view="home">🏠 首页</a>
                <a href="#papers" class="nav-item" data-view="papers">📄 论文笔记</a>
                <a href="#books" class="nav-item" data-view="books">📖 书籍笔记</a>
                <a href="#concepts" class="nav-item" data-view="concepts">💡 概念梳理</a>
                <a href="#graph" class="nav-item" data-view="graph">🧠 知识脑图</a>
                <a href="#about" class="nav-item" data-view="about">ℹ️ 关于</a>
            </nav>
            <div class="tags-cloud" id="tags-cloud">
                <h3>🏷️ 热门标签</h3>
                <div class="tags-list"></div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main">
            <!-- 搜索栏 -->
            <header class="header">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="🔍 搜索文章、作者或关键词...">
                    <button id="semantic-search-btn" title="语义搜索">🧠</button>
                </div>
                <div class="view-toggle">
                    <button class="view-btn active" data-mode="list">📋 列表</button>
                    <button class="view-btn" data-mode="grid">⊞ 网格</button>
                </div>
            </header>

            <!-- 内容区域 -->
            <div class="content" id="content">
                <!-- 动态加载内容 -->
            </div>
        </main>
    </div>

    <!-- 文章详情模态框 -->
    <div class="modal" id="article-modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <article id="article-content"></article>
        </div>
    </div>

    <!-- 脑图视图 -->
    <div class="graph-view" id="graph-view" style="display: none;">
        <div class="graph-controls">
            <input type="text" id="graph-search" placeholder="查找节点...">
            <button id="reset-zoom">重置视图</button>
            <div class="legend">
                <span class="legend-item"><span class="dot paper"></span> 论文</span>
                <span class="legend-item"><span class="dot book"></span> 书籍</span>
                <span class="legend-item"><span class="dot concept"></span> 概念</span>
                <span class="legend-item"><span class="dot author"></span> 作者</span>
            </div>
        </div>
        <div id="graph-container"></div>
    </div>

    <!-- 交互式组件脚本 -->
    <script src="js/parsers/MarkdownInteractive.js"></script>
    <script src="js/components/CodeRunner.js"></script>
    <script src="js/components/ParamSlider.js"></script>
    <script src="js/components/ChartRenderer.js"></script>
    <script src="js/components/DataTable.js"></script>
    <script src="js/app.js"></script>

    <!-- PyScript 配置 -->
    <script type="py">
        import js
        from pyscript import when
        
        # 标记 PyScript 已加载
        js.window.pyscriptLoaded = True
        js.document.getElementById('pyscript-loader').style.display = 'none'
        
        print("✅ Python 运行环境已就绪")
    </script>
</body>
</html>
